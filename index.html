<script>
/* ══════════════════════════════════════════
   PROTECCIÓN ANTI-PUBLICIDAD (WebView Safe)
   ══════════════════════════════════════════ */
(function(){
  'use strict';
  // Selectores de elementos de publicidad a eliminar del DOM
  const AD_SEL=[
    'iframe[src*="doubleclick"]','iframe[src*="googlesyndication"]',
    'iframe[src*="adnxs"]','iframe[src*="amazon-adsystem"]',
    'ins.adsbygoogle','div[id*="google_ads"]','div[class*="ad-banner"]',
    'div[id*="ad-container"]','div[class*="advertisement"]',
    '[data-ad]','[data-adunit]','script[src*="googlesyndication"]',
    'script[src*="googletagmanager"]','script[src*="doubleclick"]',
  ];
  function removeAds(root){
    AD_SEL.forEach(sel=>{ try{ root.querySelectorAll(sel).forEach(el=>el.remove()); }catch(e){} });
  }
  const obs=new MutationObserver(ms=>{
    ms.forEach(m=>m.addedNodes.forEach(node=>{
      if(node.nodeType===1){
        AD_SEL.forEach(sel=>{ try{ if(node.matches&&node.matches(sel))node.remove(); }catch(e){} });
        removeAds(node);
      }
    }));
  });
  function start(){
    try{ obs.observe(document.body||document.documentElement,{childList:true,subtree:true}); }catch(e){}
    removeAds(document);
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',start); }else{ start(); }
  // Bloquear window.open (popups)
  const _open=window.open;
  window.open=function(url,t,f){
    const AD=['doubleclick','googlesyndication','adnxs','taboola','outbrain','exoclick','popads','popcash'];
    if(url&&AD.some(d=>url.includes(d))) return null;
    return _open&&_open.call(window,url,t,f);
  };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MOTOR DE AUDIO — robusto, compatible iOS/Android/Desktop
   ─────────────────────────────────────────*/
// ── MOTOR DE AUDIO (con protección para WebView sin speechSynthesis) ──
const HAS_SPEECH = (typeof window.speechSynthesis !== 'undefined');
const synth = HAS_SPEECH ? window.speechSynthesis : null;
let voices = [];
let engVoice = null;
let activeEl = null;
let playQueue = [];
let playingAll = false;

function setBar(msg, cls = 'ready') {
  var bar = document.getElementById('audioBar');
  var txt = document.getElementById('audioMsg');
  if(bar) bar.className = cls;
  if(txt) txt.textContent = msg;
}

function loadVoices() {
  if(!HAS_SPEECH) return;
  voices = synth.getVoices();
  if (!voices.length) return;
  engVoice =
    voices.find(v => v.lang === 'en-US' && /google/i.test(v.name)) ||
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang.startsWith('en')) ||
    voices[0];
  const name = engVoice ? engVoice.name.split(' ').slice(0, 3).join(' ') : 'default';
  setBar('🔊 Audio listo · voz: ' + name, 'ready');
}

if (HAS_SPEECH) {
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 500);
  setTimeout(loadVoices, 1500);
} else {
  setBar('📖 Modo lectura · audio no disponible en este dispositivo', 'ready');
}

function clearLit() {
  document.querySelectorAll('.lit').forEach(e => e.classList.remove('lit'));
}

function cancelSynth() {
  if(HAS_SPEECH && synth) synth.cancel();
  clearLit();
  playingAll = false;
  playQueue = [];
  if (activeEl) { activeEl.classList.remove('lit'); activeEl = null; }
}

/* Habla UN texto. Llama onEnd cuando termina. */
function doSpeak(text, el, onEnd) {
  if(!HAS_SPEECH || !synth){
    setBar('📖 Audio no disponible', 'ready');
    if(onEnd) onEnd();
    return;
  }
  synth.cancel();
  clearLit();
  if (el) { el.classList.add('lit'); activeEl = el; }
  setTimeout(() => {
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.80;
      u.pitch = 1.0;
      u.volume = 1.0;
      if (engVoice) u.voice = engVoice;
      u.onstart = () => setBar('🔊 "' + text.slice(0,45) + (text.length>45?'…':'') + '"', 'speaking');
      u.onend = () => {
        if (el) el.classList.remove('lit');
        setBar('✅ Toca otra frase', 'ready');
        if (onEnd) onEnd();
      };
      u.onerror = (e) => {
        if (el) el.classList.remove('lit');
        if (e.error !== 'interrupted' && e.error !== 'canceled') {
          setBar('⚠️ Error: ' + e.error, 'error');
        } else {
          setBar('⏹ Detenido', 'ready');
        }
        if (onEnd) onEnd();
      };
      synth.speak(u);
    } catch(err) {
      if(el) el.classList.remove('lit');
      setBar('⚠️ Error de audio', 'error');
      if(onEnd) onEnd();
    }
  }, 100);
}

/* Habla UNA frase (botón individual) */
function speakOne(text, el) {
  if(HAS_SPEECH && !voices.length) loadVoices();
  playingAll = false;
  playQueue = [];
  doSpeak(text, el, null);
}

/* Habla TODA la lista en secuencia */
function speakAll(items, btnEl) {
  cancelSynth();
  playingAll = true;
  if (btnEl) btnEl.disabled = true;
  let i = 0;

  function next() {
    if (!playingAll || i >= items.length) {
      clearLit();
      playingAll = false;
      if (btnEl) btnEl.disabled = false;
      setBar('✅ Diálogo completo', 'ready');
      return;
    }
    const item = items[i++];
    doSpeak(item.text, item.el, () => setTimeout(next, 450));
  }
  next();
}

function stopAll() {
  cancelSynth();
  // Re-enable any disabled buttons
  document.querySelectorAll('.speak-all-btn').forEach(b => b.disabled = false);
  setBar('⏹ Detenido', 'ready');
}

/* ─────────────────────────────────────────
   DATOS — temas de conversación
   ─────────────────────────────────────────*/
const TOPICS = [

function buildNav() {
  const nav = document.getElementById('nav');
  TOPICS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
      const sec = document.getElementById('sec-' + t.id);
      if (sec) { sec.classList.add('active'); }
    };
    nav.appendChild(btn);
  });
}

function buildSections() {
  const main = document.getElementById('main');
  TOPICS.forEach((topic, ti) => {
    const sec = document.createElement('div');
    sec.className = 'topic-section' + (ti === 0 ? ' active' : '');
    sec.id = 'sec-' + topic.id;
    main.appendChild(sec);

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'topic-header';
    hdr.innerHTML = `<div class="topic-icon">${topic.icon}</div><div>
      <div class="topic-title">${topic.label}</div>
      <div class="topic-desc">${topic.desc}</div></div>`;
    sec.appendChild(hdr);

    // Tips
    const tBlock = document.createElement('div');
    tBlock.className = 'tips-block';
    tBlock.innerHTML = '<div class="tips-block-title">🔑 Frases clave — toca para escuchar</div>';
    topic.tips.forEach(tip => {
      const card = document.createElement('div');
      card.className = 'phrase-card';
      card.innerHTML = `<div class="phrase-texts">
        <div class="phrase-en">${tip.en}</div>
        <div class="phrase-es">${tip.es}</div>
        <div class="phrase-pro">🔊 ${tip.pro}</div>
      </div><div class="play-icon">🔊</div>`;
      card.onclick = () => speakOne(tip.en, card);
      tBlock.appendChild(card);
    });
    sec.appendChild(tBlock);

    // Scenarios
    topic.scenarios.forEach((sc, si) => {
      const scEl = document.createElement('div');
      scEl.className = 'scenario open';

      const scHdr = document.createElement('div');
      scHdr.className = 'scenario-header';
      scHdr.innerHTML = `<div class="scenario-title">${sc.title}</div><div class="chevron">▼</div>`;
      scHdr.onclick = () => scEl.classList.toggle('open');
      scEl.appendChild(scHdr);

      const body = document.createElement('div');
      body.className = 'scenario-body';

      const hint = document.createElement('div');
      hint.className = 'hint';
      hint.innerHTML = `<strong>💡 Cómo practicar:</strong> Toca cada burbuja para escucharla individualmente · Lee la <span style="color:var(--yellow)">pronunciación en amarillo</span> y repite en voz alta · Usa <strong>▶️ Escuchar todo</strong> para el diálogo completo`;
      body.appendChild(hint);

      const dial = document.createElement('div');
      dial.className = 'dialogue';
      const bubbleItems = [];

      sc.lines.forEach(line => {
        const lineEl = document.createElement('div');
        lineEl.className = `line ${line.who}`;
        const av = document.createElement('div');
        av.className = 'avatar';
        av.textContent = line.who === 'a' ? '👤' : '👥';
        const bub = document.createElement('div');
        bub.className = 'bubble';
        bub.innerHTML = `<div class="bubble-en">${line.en}</div>
          <div class="bubble-es">${line.es}</div>
          <div class="bubble-pro">🔊 ${line.pro}</div>`;
        bub.onclick = () => speakOne(line.en, bub);
        bubbleItems.push({ text: line.en, el: bub });
        lineEl.appendChild(av);
        lineEl.appendChild(bub);
        dial.appendChild(lineEl);
      });

      body.appendChild(dial);

      const btnRow = document.createElement('div');
      btnRow.className = 'btn-row';

      const playBtn = document.createElement('button');
      playBtn.className = 'speak-all-btn';
      playBtn.innerHTML = '▶️ Escuchar todo el diálogo';
      playBtn.onclick = () => speakAll(bubbleItems, playBtn);

      const stopBtn = document.createElement('button');
      stopBtn.className = 'stop-btn';
      stopBtn.innerHTML = '⏹ Detener';
      stopBtn.onclick = stopAll;

      btnRow.appendChild(playBtn);
      btnRow.appendChild(stopBtn);
      body.appendChild(btnRow);
      scEl.appendChild(body);
      sec.appendChild(scEl);
    });
  });
}

function buildAlphaNumbers() {
  const main = document.getElementById('main');

  // ── ABECEDARIO ──
  const secA = document.createElement('div');
  secA.className = 'topic-section';
  secA.id = 'sec-abecedario';

  const hdrA = document.createElement('div');
  hdrA.className = 'topic-header';
  hdrA.innerHTML = '<div class="topic-icon">🔤</div><div><div class="topic-title">🔤 El Abecedario</div><div class="topic-desc">Las 26 letras del inglés con pronunciación y ejemplo</div></div>';
  secA.appendChild(hdrA);

  const hintA = document.createElement('div');
  hintA.className = 'hint';
  hintA.style.marginBottom = '14px';
  hintA.innerHTML = '<strong>💡 Cómo practicar:</strong> Toca cada letra para escucharla en inglés · La palabra ejemplo te ayuda a recordarla · Usa <strong>▶️ Escuchar todo</strong> para repasar';

  const rowA = document.createElement('div');
  rowA.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px';
  const playAllA = document.createElement('button');
  playAllA.className = 'speak-all-alpha';
  playAllA.innerHTML = '▶️ Escuchar todo el abecedario';
  const stopAllA = document.createElement('button');
  stopAllA.className = 'speak-all-alpha';
  stopAllA.style.background = 'rgba(239,68,68,.2)';
  stopAllA.style.boxShadow = 'none';
  stopAllA.style.color = '#EF4444';
  stopAllA.innerHTML = '⏹ Detener';
  stopAllA.onclick = stopAll;
  rowA.appendChild(playAllA);
  rowA.appendChild(stopAllA);
  secA.appendChild(rowA);

  const gridA = document.createElement('div');
  gridA.className = 'alpha-grid';
  const alphaItems = [];
  ALPHABET.forEach(({l, word, pro}) => {
    const card = document.createElement('div');
    card.className = 'alpha-card';
    card.innerHTML = '<div class="alpha-letter">'+l+'</div><div class="alpha-word">'+word+'</div><div class="alpha-pro">'+pro+'</div>';
    card.onclick = () => speakOne(l, card);
    alphaItems.push({text: l, el: card});
    gridA.appendChild(card);
  });
  playAllA.onclick = () => speakAll(alphaItems, playAllA);
  secA.appendChild(gridA);
  main.appendChild(secA);

  // ── NÚMEROS ──
  const secN = document.createElement('div');
  secN.className = 'topic-section';
  secN.id = 'sec-numeros';

  const hdrN = document.createElement('div');
  hdrN.className = 'topic-header';

  const hintN = document.createElement('div');
  hintN.className = 'hint';
  hintN.style.marginBottom = '14px';
  hintN.innerHTML = '<strong>💡 Cómo practicar:</strong> Toca cada número para escucharlo · Lee la <span style="color:var(--blue)">pronunciación en azul</span> y repite en voz alta';
  secN.appendChild(hintN);

  const rowN = document.createElement('div');
  rowN.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px';
  const playAllN = document.createElement('button');
  playAllN.className = 'speak-all-alpha';
  playAllN.innerHTML = '▶️ Escuchar todos los números';
  const stopAllN = document.createElement('button');
  stopAllN.className = 'speak-all-alpha';
  stopAllN.style.background = 'rgba(239,68,68,.2)';
  stopAllN.style.boxShadow = 'none';
  stopAllN.style.color = '#EF4444';

  stopAllN.onclick = stopAll;

  rowN.appendChild(stopAllN);
  secN.appendChild(rowN);

  sub1.className = 'section-subtitle';

  const ordinals  = NUMBERS.filter(x =>  x.n.includes('st') ||  x.n.includes('nd') ||  x.n.includes('rd') ||  x.n.includes('th'));

  });

  main.appendChild(secN);
}

// Nav buttons for alphabet & numbers — ahora dentro de initApp
function buildExtraNav(){
  const nav = document.getElementById('nav');
  if(!nav) return;
  [{id:'abecedario', label:'🔤 Abecedario'}, {id:'numeros', label:'🔢 Números'}].forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = item.label;
    btn.onclick = () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
      const sec = document.getElementById('sec-'+item.id);
      if (sec) sec.classList.add('active');
    };
    nav.appendChild(btn);
  });
}
